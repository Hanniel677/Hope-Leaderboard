<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOPE Tracker - LeetCode Leaderboard</title>
    <meta name="description" content="HOPE Tracker — Live LeetCode leaderboard for St. Joseph's Engineering students">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="title">HOPE Stalker</h1>
            <div class="meta-info">
                <div class="member-count">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    <span id="memberCount">0</span>
                </div>
                <div class="last-updated" id="lastUpdated"></div>
            </div>
        </header>

        <!-- Controls -->
        <div class="controls">
            <div class="search-box">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="searchInput" placeholder="Search by name or username…">
            </div>
            <div class="filters">
                <select id="collegeFilter">
                    <option value="all">All Colleges</option>
                    <option value="St. Joseph's College of Engineering">SJCE</option>
                    <option value="St. Joseph's Institute of Technology">SJIT</option>
                </select>
                <select id="branchFilter">
                    <option value="all">All Branches</option>
                </select>
                <button id="refreshBtn" class="refresh-btn" title="Clear cache and re-fetch all data">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10" />
                        <polyline points="1 20 1 14 7 14" />
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                    </svg>
                    Refresh
                </button>
            </div>
        </div>

        <!-- Loading Indicator -->
        <div class="loading-bar" id="loadingBar">
            <div class="loading-progress" id="loadingProgress"></div>
        </div>
        <div class="loading-text" id="loadingText"></div>

        <!-- Leaderboard Table -->
        <div class="table-wrapper">
            <table class="leaderboard-table" id="leaderboardTable">
                <thead>
                    <tr>
                        <th class="col-rank">
                            Rank
                            <span class="info-icon" data-tooltip="Ranked by total problems solved">ⓘ</span>
                        </th>
                        <th class="col-name">Name</th>
                        <th class="col-solved sortable" data-sort="totalSolved">
                            Problems<br>solved
                            <span class="sort-icon">▼</span>
                        </th>
                        <th class="col-consistency">
                            30 Days<br>consistency
                            <span class="info-icon" data-tooltip="Active days in last 30 days">ⓘ</span>
                        </th>
                        <th class="col-easy sortable" data-sort="easySolved">
                            Easy
                            <span class="sort-icon">▼</span>
                        </th>
                        <th class="col-medium sortable" data-sort="mediumSolved">
                            Medium
                            <span class="sort-icon">▼</span>
                        </th>
                        <th class="col-hard sortable" data-sort="hardSolved">
                            Hard
                            <span class="sort-icon">▼</span>
                        </th>
                        <th class="col-rating sortable" data-sort="contestRating">
                            Contest Rating
                            <span class="sort-icon">▼</span>
                        </th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                </tbody>
            </table>
        </div>

        <!-- Footer -->
        <div class="footer">
            Data sourced from <a href="https://leetcode.com" target="_blank" rel="noopener">LeetCode</a> &middot;
            Auto-refreshes every 30 minutes
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
