<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOPE Tracker - LeetCode Leaderboard</title>
    <meta name="description" content="HOPE Tracker — Live LeetCode leaderboard for St. Joseph's Engineering students">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="title">HOPE Stalker</h1>
            <div class="meta-info">
                <div class="member-count">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    <span id="memberCount">0</span>
                </div>
                <div class="last-updated" id="lastUpdated"></div>
            </div>
        </header>

        <!-- Controls -->
        <div class="controls">
            <div class="search-box">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="searchInput" placeholder="Search by name or username…">
            </div>
            <div class="filters">
                <select id="collegeFilter">
                    <option value="all">All Colleges</option>
                    <option value="St. Joseph's College of Engineering">SJCE</option>
                    <option value="St. Joseph's Institute of Technology">SJIT</option>
                </select>
                <select id="branchFilter">
                    <option value="all">All Branches</option>
                </select>
                <button id="refreshBtn" class="refresh-btn" title="Clear cache and re-fetch all data">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10" />
                        <polyline points="1 20 1 14 7 14" />
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                    </svg>
                    Refresh
                </button>
            </div>
        </div>

        <!-- Loading Indicator -->
        <div class="loading-bar" id="loadingBar">
            <div class="loading-progress" id="loadingProgress"></div>
        </div>
        <div class="loading-text" id="loadingText"></div>

        <!-- Leaderboard Table -->
        <div class="table-wrapper">
            <table class="leaderboard-table" id="leaderboardTable">
                <thead>
                    <tr>
                        <th class="col-rank">
                            Rank
                            <span class="info-icon" data-tooltip="Ranked by total problems solved">ⓘ</span>
                        </th>
                        <th class="col-name">Name</th>
                        <th class="col-solved sortable" data-sort="totalSolved">
                            Problems<br>solved
                            <span class="sort-icon">▼</span>
                        </th>
                        <th class="col-consistency">
                            30 Days<br>consistency
                            <span class="info-icon" data-tooltip="Active days in last 30 days">ⓘ</span>
                        </th>
                        <th class="col-easy sortable" data-sort="easySolved">
                            Easy
                            <span class="sort-icon">▼</span>
                        </th>
                        <th class="col-medium sortable" data-sort="mediumSolved">
                            Medium
                            <span class="sort-icon">▼</span>
                        </th>
                        <th class="col-hard sortable" data-sort="hardSolved">
                            Hard
                            <span class="sort-icon">▼</span>
                        </th>
                        <th class="col-rating sortable" data-sort="contestRating">
                            Contest Rating
                            <span class="sort-icon">▼</span>
                        </th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                </tbody>
            </table>
        </div>

        <!-- Footer -->
        <div class="footer">
            Data sourced from <a href="https://leetcode.com" target="_blank" rel="noopener">LeetCode</a> &middot;
            Auto-refreshes every 30 minutes
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-header">
                <div id="modalAvatar" class="modal-avatar"></div>
                <div class="modal-title-group">
                    <h2 id="modalName">Participant Name</h2>
                    <p id="modalBadge">College · Branch</p>
                </div>
            </div>
            <div class="modal-body">
                <div class="info-item">
                    <div class="info-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                            </path>
                        </svg>
                    </div>
                    <div class="info-content">
                        <label>Phone Number</label>
                        <a id="modalPhone" href="#">Not available</a>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                            </path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                    <div class="info-content">
                        <label>Email Address</label>
                        <a id="modalEmail" href="#">Not available</a>
                    </div>
                </div>
                <div class="modal-actions">
                    <a id="modalLeetCode" href="#" target="_blank" class="leetcode-redirect-btn">
                        <span>View LeetCode Profile</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <line x1="10" y1="14" x2="21" y2="3"></line>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
